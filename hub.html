<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub - Undangan Pernikahan Naufal & Imel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .card-icon {
            font-size: 48px;
            margin-bottom: 15px;
            color: #667eea;
        }

        .card h2 {
            font-size: 18px;
            margin-bottom: 10px;
            color: #333;
        }

        .card p {
            font-size: 13px;
            color: #999;
            line-height: 1.6;
        }

        .badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            margin-top: 10px;
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 24px;
            }

            .card-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💒 Hub Undangan</h1>
            <p>Kelola undangan pernikahan Anda</p>
        </div>

        <div class="card-grid">
            <!-- Halaman Undangan -->
            <a href="index.html" class="card">
                <div class="card-icon"><i class="fas fa-heart"></i></div>
                <h2>Halaman Undangan</h2>
                <p>Lihat dan bagikan undangan pernikahan</p>
                <span class="badge">📱 Guest</span>
            </a>

            <!-- URL Generator -->
            <a href="url-generator.html" class="card">
                <div class="card-icon"><i class="fas fa-link"></i></div>
                <h2>Generate URL</h2>
                <p>Buat link personal untuk setiap tamu</p>
                <span class="badge">🎯 Host</span>
            </a>

            <!-- QR Code Generator -->
            <a href="qrcode-generator.html" class="card">
                <div class="card-icon"><i class="fas fa-qrcode"></i></div>
                <h2>QR Code Generator</h2>
                <p>Generate QR Code untuk tamu</p>
                <span class="badge">🎨 Tools</span>
            </a>

            <!-- Admin Dashboard -->
            <a href="admin.html" class="card">
                <div class="card-icon"><i class="fas fa-lock"></i></div>
                <h2>Admin Dashboard</h2>
                <p>Lihat data RSVP dan ucapan tamu</p>
                <span class="badge">🔐 Secure</span>
            </a>
        </div>
    </div>
</body>
</html>
