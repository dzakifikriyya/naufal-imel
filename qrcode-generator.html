<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator - Undangan Pernikahan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode.js/1.5.3/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
        }

        .tab-btn {
            padding: 12px 24px;
            background: none;
            border: none;
            color: #999;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .qr-result {
            text-align: center;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-top: 20px;
        }

        #qrcodeContainer {
            display: inline-block;
            padding: 20px;
            background: white;
            border-radius: 10px;
            margin: 20px 0;
        }

        .info-text {
            color: #666;
            font-size: 13px;
            margin-top: 15px;
            line-height: 1.6;
        }

        .btn-download {
            background: #28a745;
            color: white;
            margin-top: 15px;
        }

        .btn-download:hover {
            background: #218838;
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 480px) {
            .content {
                padding: 20px;
            }

            .input-group {
                grid-template-columns: 1fr;
            }

            .tabs {
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-qrcode"></i> QR Code Generator</h1>
            <p>Buat QR Code untuk undangan personal</p>
        </div>

        <div class="content">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('single')">
                    <i class="fas fa-qrcode"></i> Single QR Code
                </button>
                <button class="tab-btn" onclick="switchTab('bulk')">
                    <i class="fas fa-layer-group"></i> Bulk QR Code
                </button>
            </div>

            <!-- TAB 1: Single QR Code -->
            <div id="single" class="tab-content active">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Nama Tamu</label>
                    <input type="text" id="singleGuestName" placeholder="Contoh: Ipal & Partner">
                </div>

                <button class="btn-primary" onclick="generateSingleQR()">
                    <i class="fas fa-magic"></i> Generate QR Code
                </button>

                <div id="singleResult"></div>
            </div>

            <!-- TAB 2: Bulk QR Code -->
            <div id="bulk" class="tab-content">
                <div class="form-group">
                    <label><i class="fas fa-list"></i> Daftar Nama Tamu (satu nama per baris)</label>
                    <textarea id="bulkGuestList" rows="8" placeholder="Ipal & Partner&#10;Budi Santoso&#10;Keluarga Ahmad&#10;Siti Nurhaliza"></textarea>
                </div>

                <div class="button-group">
                    <button class="btn-primary" onclick="generateBulkQR()">
                        <i class="fas fa-magic"></i> Generate Semua
                    </button>
                    <button class="btn-secondary" onclick="downloadBulkQR()">
                        <i class="fas fa-download"></i> Download ZIP
                    </button>
                </div>

                <div id="bulkResult"></div>
            </div>
        </div>
    </div>

    <script>
        const baseURL = window.location.origin + window.location.pathname.replace('qrcode-generator.html', 'index.html');
        let bulkQRData = [];

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function generateSingleQR() {
            const guestName = document.getElementById('singleGuestName').value.trim();
            
            if (!guestName) {
                alert('Masukkan nama tamu terlebih dahulu!');
                return;
            }

            const encodedName = encodeURIComponent(guestName);
            const fullURL = `${baseURL}?to=${encodedName}`;

            const resultDiv = document.getElementById('singleResult');
            resultDiv.innerHTML = '';

            const qrContainer = document.createElement('div');
            qrContainer.className = 'qr-result';
            qrContainer.innerHTML = `
                <h3>QR Code untuk: ${escapeHtml(guestName)}</h3>
                <div id="qrcodeContainer"></div>
                <div class="info-text">
                    <p><strong>URL:</strong> ${fullURL}</p>
                    <p style="margin-top: 10px; color: #999;">Scan QR Code dengan smartphone untuk membuka undangan</p>
                </div>
                <button class="btn-primary" onclick="copyQRURL('${fullURL}')">
                    <i class="fas fa-copy"></i> Copy URL
                </button>
                <button class="btn-download" onclick="downloadQRImage('${guestName}')">
                    <i class="fas fa-download"></i> Download QR Code
                </button>
            `;

            resultDiv.appendChild(qrContainer);

            // Generate QR Code
            const qrcodeDiv = document.getElementById('qrcodeContainer');
            qrcodeDiv.innerHTML = '';
            new QRCode(qrcodeDiv, {
                text: fullURL,
                width: 256,
                height: 256,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        function generateBulkQR() {
            const guestList = document.getElementById('bulkGuestList').value.trim().split('\n').filter(name => name.trim());
            
            if (guestList.length === 0) {
                alert('Masukkan minimal satu nama tamu!');
                return;
            }

            bulkQRData = [];
            const resultDiv = document.getElementById('bulkResult');
            resultDiv.innerHTML = '<p style="text-align: center; color: #667eea; margin-bottom: 20px;"><i class="fas fa-spinner fa-spin"></i> Generating...</p>';

            setTimeout(() => {
                let html = '<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px;">';
                
                guestList.forEach((guestName, index) => {
                    const encodedName = encodeURIComponent(guestName.trim());
                    const fullURL = `${baseURL}?to=${encodedName}`;
                    
                    bulkQRData.push({
                        name: guestName.trim(),
                        url: fullURL
                    });

                    html += `
                        <div style="text-align: center; padding: 15px; background: #f8f9fa; border-radius: 10px;">
                            <div style="font-size: 12px; margin-bottom: 10px; color: #333;"><strong>${escapeHtml(guestName.trim())}</strong></div>
                            <div id="qr-${index}" style="display: inline-block; padding: 10px; background: white; border-radius: 8px;"></div>
                        </div>
                    `;
                });

                html += '</div>';
                resultDiv.innerHTML = html;

                // Generate semua QR Code
                guestList.forEach((guestName, index) => {
                    const encodedName = encodeURIComponent(guestName.trim());
                    const fullURL = `${baseURL}?to=${encodedName}`;
                    
                    new QRCode(document.getElementById(`qr-${index}`), {
                        text: fullURL,
                        width: 150,
                        height: 150,
                        colorDark: "#000000",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.H
                    });
                });
            }, 500);
        }

        function copyQRURL(url) {
            navigator.clipboard.writeText(url).then(() => {
                alert('URL berhasil di-copy!');
            });
        }

        function downloadQRImage(guestName) {
            const canvas = document.querySelector('#qrcodeContainer canvas');
            const image = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.href = image;
            link.download = `QR_${guestName.replace(/\s+/g, '_')}.png`;
            link.click();
        }

        function downloadBulkQR() {
            if (bulkQRData.length === 0) {
                alert('Generate QR Code terlebih dahulu!');
                return;
            }

            // Create CSV file
            let csv = 'Nama,URL\n';
            bulkQRData.forEach(item => {
                csv += `"${item.name}","${item.url}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'qr_code_list.csv';
            a.click();

            alert('File CSV berhasil di-download!\n\nAnda bisa import ke Excel untuk membuat label atau sertifikat');
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
