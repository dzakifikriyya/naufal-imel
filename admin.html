<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Undangan Pernikahan Naufal & Imel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .admin-header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .admin-header h1 {
            color: #333;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-card h3 {
            color: #999;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: 800;
            color: #667eea;
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 24px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            color: #666;
        }

        .tab-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .tab-btn:hover {
            border-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .table-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
        }

        th {
            padding: 18px;
            text-align: left;
            font-weight: 600;
            color: #333;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 16px 18px;
            border-bottom: 1px solid #e9ecef;
            color: #666;
        }

        tbody tr:hover {
            background: #f8f9fa;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-hadir {
            background: #d4edda;
            color: #155724;
        }

        .status-tidak {
            background: #f8d7da;
            color: #721c24;
        }

        .status-mungkin {
            background: #fff3cd;
            color: #856404;
        }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .no-data i {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .comment-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            margin-bottom: 15px;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .comment-name {
            font-weight: 700;
            color: #333;
            font-size: 15px;
        }

        .comment-date {
            color: #999;
            font-size: 13px;
            background: white;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .comment-text {
            color: #666;
            line-height: 1.6;
            font-size: 14px;
        }

        .export-section {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-top: 20px;
        }

        .export-section h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .password-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .password-modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .modal-content input:focus {
            outline: none;
            border-color: #667eea;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .modal-cancel {
            background: #ddd;
            color: #333;
        }

        .modal-cancel:hover {
            background: #ccc;
        }

        .modal-ok {
            background: #667eea;
            color: white;
        }

        .modal-ok:hover {
            background: #764ba2;
        }

        @media (max-width: 768px) {
            .admin-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            table {
                font-size: 13px;
            }

            th, td {
                padding: 12px 8px;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .tabs {
                flex-direction: column;
            }

            .tab-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Header -->
        <div class="admin-header">
            <h1><i class="fas fa-lock"></i> Admin Dashboard</h1>
            <div class="admin-buttons">
                <button class="btn btn-success" onclick="refreshData()">
                    <i class="fas fa-sync"></i> Refresh
                </button>
                <button class="btn btn-danger" onclick="clearAllData()">
                    <i class="fas fa-trash"></i> Hapus Semua Data
                </button>
                <button class="btn btn-primary" onclick="goBack()">
                    <i class="fas fa-arrow-left"></i> Kembali
                </button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total RSVP</h3>
                <div class="number" id="totalRsvp">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Hadir</h3>
                <div class="number" id="totalHadir">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Tamu</h3>
                <div class="number" id="totalGuests">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Ucapan</h3>
                <div class="number" id="totalComments">0</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('rsvp')">
                <i class="fas fa-envelope"></i> Data RSVP
            </button>
            <button class="tab-btn" onclick="switchTab('comments')">
                <i class="fas fa-comments"></i> Ucapan & Doa
            </button>
            <button class="tab-btn" onclick="switchTab('export')">
                <i class="fas fa-download"></i> Export
            </button>
        </div>

        <!-- Tab: RSVP -->
        <div id="rsvp" class="tab-content active">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Nama</th>
                            <th>Email</th>
                            <th>Status</th>
                            <th>Jumlah Tamu</th>
                            <th>Pesan</th>
                            <th>Waktu</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="rsvpTable">
                        <tr>
                            <td colspan="8" class="no-data">
                                <i class="fas fa-inbox"></i>
                                <p>Belum ada data RSVP</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Tab: Comments -->
        <div id="comments" class="tab-content">
            <div id="commentsContainer" style="background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
                <div class="no-data">
                    <i class="fas fa-comments"></i>
                    <p>Belum ada ucapan & konfirmasi</p>
                </div>
            </div>
        </div>

        <!-- Tab: Export -->
        <div id="export" class="tab-content">
            <div class="export-section">
                <h3><i class="fas fa-download"></i> Export Data</h3>
                <p style="margin-bottom: 20px; color: #666;">Pilih format untuk mengunduh data RSVP dan Ucapan</p>
                <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                    <button class="btn btn-primary" onclick="exportToCSV()">
                        <i class="fas fa-file-csv"></i> Export ke CSV
                    </button>
                    <button class="btn btn-primary" onclick="exportToJSON()">
                        <i class="fas fa-file-code"></i> Export ke JSON
                    </button>
                    <button class="btn btn-primary" onclick="exportToExcel()">
                        <i class="fas fa-file-excel"></i> Export ke Excel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Password Modal -->
    <div id="passwordModal" class="password-modal">
        <div class="modal-content">
            <h2>🔒 Masukkan Password Admin</h2>
            <input type="password" id="passwordInput" placeholder="Password" onkeypress="if(event.key==='Enter') verifyPassword()">
            <div class="modal-buttons">
                <button class="modal-cancel" onclick="cancelPassword()">Batal</button>
                <button class="modal-ok" onclick="verifyPassword()">Masuk</button>
            </div>
        </div>
    </div>

    <script>
        // Password admin (GANTI INI KE PASSWORD ANDA)
        const ADMIN_PASSWORD = "admin123";

        // Check password on load
        window.addEventListener('load', () => {
            const isLoggedIn = sessionStorage.getItem('adminLoggedIn');
            if (!isLoggedIn) {
                document.getElementById('passwordModal').classList.add('active');
            } else {
                loadData();
            }
        });

        function verifyPassword() {
            const password = document.getElementById('passwordInput').value;
            if (password === ADMIN_PASSWORD) {
                sessionStorage.setItem('adminLoggedIn', 'true');
                document.getElementById('passwordModal').classList.remove('active');
                loadData();
            } else {
                alert('❌ Password salah!');
                document.getElementById('passwordInput').value = '';
            }
        }

        function cancelPassword() {
            window.history.back();
        }

        // Load data dari localStorage
        function loadData() {
            const rsvpData = JSON.parse(localStorage.getItem('rsvpData') || '[]');
            const commentsData = JSON.parse(localStorage.getItem('commentsData') || '[]');

            displayRSVP(rsvpData);
            displayComments(commentsData);
            updateStats(rsvpData, commentsData);
        }

        // Display RSVP data
        function displayRSVP(data) {
            const table = document.getElementById('rsvpTable');

            if (data.length === 0) {
                table.innerHTML = `
                    <tr>
                        <td colspan="8" class="no-data">
                            <i class="fas fa-inbox"></i>
                            <p>Belum ada data RSVP</p>
                        </td>
                    </tr>
                `;
                return;
            }

            table.innerHTML = data.map((item, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td><strong>${escapeHtml(item.name)}</strong></td>
                    <td>${escapeHtml(item.email)}</td>
                    <td>
                        <span class="status-badge status-${item.attendance}">
                            ${item.attendance === 'hadir' ? '✓ Hadir' : item.attendance === 'tidak' ? '✗ Tidak' : '? Mungkin'}
                        </span>
                    </td>
                    <td><strong>${item.guests}</strong> orang</td>
                    <td style="max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                        ${item.message ? escapeHtml(item.message) : '<em style="color: #ccc;">-</em>'}
                    </td>
                    <td style="font-size: 13px;">${new Date(item.timestamp).toLocaleDateString('id-ID', {year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'})}</td>
                    <td>
                        <button class="btn btn-danger" onclick="deleteRSVP(${index})" style="padding: 6px 12px; font-size: 12px;">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // Display Comments
        function displayComments(data) {
            const container = document.getElementById('commentsContainer');

            if (data.length === 0) {
                container.innerHTML = `
                    <div class="no-data">
                        <i class="fas fa-comments"></i>
                        <p>Belum ada ucapan & konfirmasi</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = data.map((comment, index) => `
                <div class="comment-card">
                    <div class="comment-header">
                        <div>
                            <div class="comment-name">👤 ${escapeHtml(comment.name)}</div>
                            <div style="font-size: 12px; color: #999; margin-top: 4px;">${escapeHtml(comment.email)}</div>
                            ${comment.attendance ? `<div style="font-size: 12px; margin-top: 6px;">
                                <span style="display: inline-block; padding: 4px 10px; border-radius: 12px; background: ${comment.attendance === 'hadir' ? '#d4edda' : comment.attendance === 'tidak' ? '#f8d7da' : '#fff3cd'}; color: ${comment.attendance === 'hadir' ? '#155724' : comment.attendance === 'tidak' ? '#721c24' : '#856404'}; font-weight: 600;">
                                    ${comment.attendance === 'hadir' ? '✓ Hadir' : comment.attendance === 'tidak' ? '✗ Tidak Hadir' : '? Mungkin'} (${comment.guests} orang)
                                </span>
                            </div>` : ''}
                        </div>
                        <div style="display: flex; gap: 10px; align-items: center;">
                            <div class="comment-date">${new Date(comment.timestamp).toLocaleDateString('id-ID', {year: 'numeric', month: 'short', day: 'numeric'})}</div>
                            <button class="btn btn-danger" onclick="deleteComment(${index})" style="padding: 6px 12px; font-size: 12px;">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                    <div class="comment-text">"${escapeHtml(comment.text)}"</div>
                </div>
            `).join('');
        }

        // Update Statistics
        function updateStats(rsvpData, commentsData) {
            document.getElementById('totalRsvp').textContent = rsvpData.length;
            document.getElementById('totalHadir').textContent = rsvpData.filter(r => r.attendance === 'hadir').length;
            document.getElementById('totalGuests').textContent = rsvpData.reduce((sum, r) => sum + parseInt(r.guests || 0), 0);
            document.getElementById('totalComments').textContent = commentsData.length;
        }

        // Switch Tab
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        // Delete RSVP
        function deleteRSVP(index) {
            if (!confirm('Yakin ingin menghapus data ini?')) return;
            
            const rsvpData = JSON.parse(localStorage.getItem('rsvpData') || '[]');
            rsvpData.splice(index, 1);
            localStorage.setItem('rsvpData', JSON.stringify(rsvpData));
            loadData();
            alert('✓ Data berhasil dihapus');
        }

        // Delete Comment
        function deleteComment(index) {
            if (!confirm('Yakin ingin menghapus ucapan ini?')) return;
            
            const commentsData = JSON.parse(localStorage.getItem('commentsData') || '[]');
            commentsData.splice(index, 1);
            localStorage.setItem('commentsData', JSON.stringify(commentsData));
            loadData();
            alert('✓ Ucapan berhasil dihapus');
        }

        // Clear All Data
        function clearAllData() {
            if (!confirm('⚠️ PERHATIAN: Ini akan menghapus SEMUA data! Yakin?')) return;
            if (!confirm('Terakhir kali: Ini tidak bisa dibatalkan!')) return;
            
            localStorage.removeItem('rsvpData');
            localStorage.removeItem('commentsData');
            loadData();
            alert('✓ Semua data berhasil dihapus');
        }

        // Refresh Data
        function refreshData() {
            loadData();
            alert('✓ Data di-refresh');
        }

        // Go Back
        function goBack() {
            window.location.href = 'index.html';
        }

        // Export to CSV
        function exportToCSV() {
            const rsvpData = JSON.parse(localStorage.getItem('rsvpData') || '[]');
            const commentsData = JSON.parse(localStorage.getItem('commentsData') || '[]');

            let csv = 'RSVP DATA\n';
            csv += 'Nama,Email,Status,Jumlah Tamu,Pesan,Waktu\n';
            
            rsvpData.forEach(item => {
                csv += `"${item.name}","${item.email}","${item.attendance}","${item.guests}","${item.message || ''}","${item.timestamp}"\n`;
            });

            csv += '\n\nUCAPAN DATA\n';
            csv += 'Nama,Ucapan,Waktu\n';
            
            commentsData.forEach(item => {
                csv += `"${item.name}","${item.text}","${item.timestamp}"\n`;
            });

            downloadFile(csv, 'undangan-data.csv', 'text/csv');
        }

        // Export to JSON
        function exportToJSON() {
            const rsvpData = JSON.parse(localStorage.getItem('rsvpData') || '[]');
            const commentsData = JSON.parse(localStorage.getItem('commentsData') || '[]');

            const data = {
                rsvp: rsvpData,
                comments: commentsData,
                exportedAt: new Date().toISOString()
            };

            downloadFile(JSON.stringify(data, null, 2), 'undangan-data.json', 'application/json');
        }

        // Export to Excel (simple version)
        function exportToExcel() {
            const rsvpData = JSON.parse(localStorage.getItem('rsvpData') || '[]');
            const commentsData = JSON.parse(localStorage.getItem('commentsData') || '[]');

            let html = `
                <table border="1">
                    <tr><th colspan="6" style="background: #667eea; color: white; padding: 10px;">DATA RSVP</th></tr>
                    <tr>
                        <th>Nama</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Jumlah Tamu</th>
                        <th>Pesan</th>
                        <th>Waktu</th>
                    </tr>
            `;

            rsvpData.forEach(item => {
                html += `
                    <tr>
                        <td>${item.name}</td>
                        <td>${item.email}</td>
                        <td>${item.attendance}</td>
                        <td>${item.guests}</td>
                        <td>${item.message || '-'}</td>
                        <td>${item.timestamp}</td>
                    </tr>
                `;
            });

            html += `
                    <tr><th colspan="6" style="background: #667eea; color: white; padding: 10px;">DATA UCAPAN</th></tr>
                    <tr>
                        <th>Nama</th>
                        <th colspan="5">Ucapan</th>
                    </tr>
            `;

            commentsData.forEach(item => {
                html += `
                    <tr>
                        <td>${item.name}</td>
                        <td colspan="5">${item.text}</td>
                    </tr>
                `;
            });

            html += '</table>';

            downloadFile(html, 'undangan-data.xls', 'application/vnd.ms-excel');
        }

        // Download File Helper
        function downloadFile(content, filename, type) {
            const blob = new Blob([content], { type });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            window.URL.revokeObjectURL(url);
            alert(`✓ ${filename} berhasil diunduh`);
        }

        // Escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Password modal - cancel
        function cancelPassword() {
            window.history.back();
        }
    </script>
</body>
</html>
