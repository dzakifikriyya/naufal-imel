<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan - Naufal & Imel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background-color: #fdf8f5; color: #4a4a4a; overflow-x: hidden; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        
        /* Header / Sampul */
        .header { 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center;
            background: linear-gradient(rgba(255,255,255,0.6), rgba(255,255,255,0.6)), url('prewed.jpeg') no-repeat center center/cover;
        }
        .names { font-family: 'Georgia', serif; font-size: 3.5rem; color: #b8860b; margin: 10px 0; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        .subtitle { font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; }

        /* Gallery Section */
        .gallery { padding: 60px 0; text-align: center; }
        .section-title { font-family: 'Georgia', serif; color: #b8860b; font-size: 2rem; margin-bottom: 30px; }
        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
        }
        .gallery-grid img { 
            width: 100%; 
            height: 350px; 
            object-fit: cover; 
            border-radius: 15px; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .gallery-grid img:hover { transform: scale(1.02); }

        /* Comments Section */
        .comment-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-top: 40px; }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; background: #fafafa; }
        .submit-btn { background-color: #b8860b; color: white; padding: 15px; border: none; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1rem; }
        
        .comments-list { margin-top: 40px; text-align: left; }
        .comment-item { background: #fff; padding: 20px; border-radius: 15px; margin-bottom: 15px; border-left: 5px solid #b8860b; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .comment-item strong { color: #b8860b; font-size: 1.1rem; }
        
        .footer { text-align: center; padding: 50px; font-size: 0.9rem; color: #999; border-top: 1px solid #eee; margin-top: 50px; }
    </style>
</head>
<body>

    <section class="header">
        <div style="background: rgba(255,255,255,0.8); padding: 40px; border-radius: 20px;">
            <p class="subtitle">Undangan Pernikahan</p>
            <h1 class="names">Naufal & Imel</h1>
            <p><i class="fas fa-calendar-alt"></i> 15 Juni 2026</p>
        </div>
    </section>

    <div class="container">
        <section class="gallery">
            <h2 class="section-title">Momen Prewedding</h2>
            <div class="gallery-grid">
                <img src="assets/prewed.jpeg" alt="Prewedding 1">
                <img src="assets/prewed2.jpeg" alt="Prewedding 2">
                <img src="assets/prewed3.jpeg" alt="Prewedding 3">
            </div>
        </section>

        <section id="comments">
            <h2 class="section-title">Ucapan & Doa Restu</h2>
            
            <div class="comment-box">
                <form id="comment-form">
                    <input type="text" id="comment-name" placeholder="Nama Anda" required>
                    <textarea id="comment-text" placeholder="Tuliskan ucapan atau doa untuk mempelai..." rows="4" required></textarea>
                    <button type="submit" class="submit-btn"><i class="fas fa-paper-plane"></i> Kirim Ucapan</button>
                </form>

                <div class="comments-list">
                    <h3>Pesan Masuk:</h3>
                    <div id="comments-container">
                        <p style="color: #999; text-align: center;">Belum ada ucapan. Silakan isi form di atas.</p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Wedding of Naufal & Imel</p>
        <p>Made with <i class="fas fa-heart" style="color: #e74c3c;"></i> for our special day</p>
    </footer>

    <script>
        // Logika sederhana untuk menambah komentar (lokal)
        const form = document.getElementById('comment-form');
        const container = document.getElementById('comments-container');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('comment-name').value;
            const text = document.getElementById('comment-text').value;
            const date = new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });

            if(container.querySelector('p')) {
                container.innerHTML = '';
            }

            const commentHtml = `
                <div class="comment-item">
                    <strong>${name}</strong>
                    <div style="font-size: 0.75rem; color: #999; margin-bottom: 8px;">${date}</div>
                    <p style="margin: 0;">${text}</p>
                </div>
            `;

            container.insertAdjacentHTML('afterbegin', commentHtml);
            form.reset();
        });
    </script>
</body>
</html>
