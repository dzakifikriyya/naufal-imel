<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan - Naufal & Imel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS INTERNAL UNTUK MEMUDAHKAN */
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background-color: #fdf8f5; color: #4a4a4a; }
        .container { max-width: 800px; margin: auto; padding: 20px; }
        
        /* Header */
        .header { 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center;
            background: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)), url('https://images.unsplash.com/photo-1519741497674-611481863552?w=1000') no-repeat center center/cover;
        }
        .names { font-family: 'Georgia', serif; font-size: 3.5rem; color: #b8860b; margin: 10px 0; }
        
        /* Gallery Section */
        .gallery { padding: 50px 0; text-align: center; }
        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 15px; 
            margin-top: 20px;
        }
        .gallery-grid img { 
            width: 100%; 
            height: 250px; 
            object-fit: cover; 
            border-radius: 10px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* Form & Comments */
        .section-title { text-align: center; color: #b8860b; font-family: 'Georgia', serif; }
        .comment-box { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .submit-btn { background-color: #b8860b; color: white; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        
        .comments-list { margin-top: 30px; }
        .comment-item { background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid #b8860b; }
        
        .footer { text-align: center; padding: 40px; font-size: 0.9rem; color: #888; }
    </style>
</head>
<body>

    <section class="header">
        <h1><i class="fas fa-heart"></i> Kami Mengundang Anda</h1>
        <p class="names">Naufal & Imel</p>
        <p class="subtitle">Sabtu, 15 Juni 2026</p>
    </section>

    <div class="container">
        <section class="gallery">
            <h2 class="section-title">Galeri Prewedding</h2>
            <div class="gallery-grid">
                <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=500" alt="Prewedding 1">
                <img src="https://images.unsplash.com/photo-1583939003579-730e3918a45a?w=500" alt="Prewedding 2">
                <img src="https://images.unsplash.com/photo-1519225421980-715cb0215aed?w=500" alt="Prewedding 3">
                <img src="https://images.unsplash.com/photo-1520854221256-17451cc331bf?w=500" alt="Prewedding 4">
            </div>
        </section>

        <hr>

        <section id="comments">
            <h2 class="section-title">Ucapan & Doa</h2>
            
            <div class="comment-box">
                <form id="comment-form">
                    <input type="text" id="comment-name" placeholder="Nama Anda *" required>
                    <textarea id="comment-text" placeholder="Tulis ucapan & doa Anda... *" rows="4" required></textarea>
                    <button type="submit" class="submit-btn">Kirim Ucapan</button>
                </form>
            </div>

            <div class="comments-list">
                <h3>Ucapan Masuk</h3>
                <div id="comments-container">
                    <p class="no-comments">Belum ada ucapan. Jadilah yang pertama!</p>
                </div>
            </div>
        </section>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Undangan Pernikahan Digital | Naufal & Imel</p>
    </footer>

    <script>
        // Logika Sederhana untuk Komentar (Lokal)
        const form = document.getElementById('comment-form');
        const container = document.getElementById('comments-container');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('comment-name').value;
            const text = document.getElementById('comment-text').value;
            const date = new Date().toLocaleString('id-ID');

            if(container.querySelector('.no-comments')) {
                container.innerHTML = '';
            }

            const commentHtml = `
                <div class="comment-item">
                    <strong>${name}</strong> <br>
                    <small style="color: #999;">${date}</small>
                    <p style="margin-top: 10px;">${text}</p>
                </div>
            `;

            container.insertAdjacentHTML('afterbegin', commentHtml);
            form.reset();
        });
    </script>
</body>
</html>
